<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ven a Ver</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Georgia, serif;
      background:#f7d21f;
      color:black;
      height:100vh;
      overflow:hidden;
      position:relative;
    }

    /* Background Shape */
    .shape{
      position:absolute;
      width:900px;
      height:500px;
      border:8px solid rgba(120, 70, 70, 0.25);
      top:50%;
      left:50%;
      transform:translate(-50%, -50%) rotate(20deg);
      border-radius:20px;
    }

    /* Main Container */
    .container{
      position:relative;
      z-index:2;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    /* Logo */
    .logo{
      width:180px;
      height:180px;
      border-radius:50%;
      border:4px solid black;
      margin-bottom:40px;
      background:white;
      object-fit:cover;
      box-shadow:0 6px 20px rgba(0,0,0,0.2);
    }

    /* Title */
    h1{
      font-size:4rem;
      max-width:1000px;
      line-height:1.2;
      margin-bottom:50px;
      font-weight:normal;
    }

    /* Buttons */
    .buttons{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .buttons a{
      text-decoration:none;
      background:black;
      color:white;
      padding:16px 34px;
      border-radius:10px;
      font-size:1.1rem;
      transition:0.3s;
    }

    .buttons a:hover{
      transform:scale(1.05);
      background:#222;
    }

    /* Mobile */
    @media(max-width:768px){

      h1{
        font-size:2.3rem;
      }

      .logo{
        width:130px;
        height:130px;
      }

      .buttons{
        flex-direction:column;
        width:100%;
        max-width:300px;
      }

      .buttons a{
        width:100%;
      }
    }

  </style>
</head>

<body>

  <div class="shape"></div>

  <div class="container">

    <!-- Replace with your logo filename -->
    <img src="https://github.com/mend0z0/venaver.github.io/blob/main/Ven%20a%20Ver_Logo.png" alt="Ven a Ver Logo" class="logo">

    <h1>Enfoquémonos en lo que más importa</h1>

    <div class="buttons">

      <!-- Replace with your actual links -->
      <a href="https://sites.google.com/view/venaver/home">
        Español
      </a>

      <a href="https://sites.google.com/view/venaver/home">
        English
      </a>

    </div>

  </div>

</body>
</html>
