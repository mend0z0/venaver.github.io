<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ven a Ver</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f7cf1e;
    overflow:hidden;
    font-family:'Montserrat', sans-serif;
    height:100vh;
    position:relative;
    color:black;
}

/* BACKGROUND */

.bg-shape{
    position:absolute;
    width:900px;
    height:900px;
    border:8px solid rgba(120,60,60,0.18);
    top:50%;
    left:50%;
    transform:translate(-50%, -50%) rotate(35deg);
    border-radius:25px;
}

.bg-circle{
    position:absolute;
    width:1400px;
    height:1400px;
    background:white;
    border-radius:50%;
    bottom:-900px;
    left:-250px;
    opacity:0.97;
}

/* MAIN */

.container{
    position:relative;
    z-index:2;
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* BUTTONS */

.language-box{
    display:flex;
    gap:35px;
    justify-content:center;
    align-items:center;

    margin-top:-120px;
}

.card{
    width:240px;
    height:220px;

    background:rgba(255,255,255,0.82);

    backdrop-filter:blur(8px);

    border-radius:24px;

    text-decoration:none;
    color:black;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    box-shadow:
        0 10px 35px rgba(0,0,0,0.12);

    transition:0.35s;
}

.card:hover{

    transform:translateY(-10px) scale(1.03);

    box-shadow:
        0 20px 45px rgba(0,0,0,0.18);
}

.card h2{
    font-family:'Cormorant Garamond', serif;
    font-size:3rem;
    margin-bottom:10px;
}

.card p{
    font-size:0.95rem;
    opacity:0.65;
}

.arrow{
    margin-top:18px;
    font-size:1.7rem;
    color:#c59600;
}

/* MOBILE */

@media(max-width:900px){

    body{
        overflow:auto;
    }

    .container{
        padding:40px 20px;
    }

    .language-box{
        flex-direction:column;
        margin-top:0;
    }

    .card{
        width:100%;
        max-width:320px;
    }
}

</style>
</head>

<body>

<div class="bg-circle"></div>
<div class="bg-shape"></div>

<div class="container">

    <div class="language-box">

        <!-- SPANISH -->
        <a class="card" href="https://sites.google.com/view/venaver/home-esp">

            <h2>Español</h2>

            <p>Continuar en Español</p>

            <div class="arrow">→</div>

        </a>

        <!-- ENGLISH -->
        <a class="card" href="https://sites.google.com/view/venaver/home-eng">

            <h2>English</h2>

            <p>Continue in English</p>

            <div class="arrow">→</div>

        </a>

    </div>

</div>

</body>
</html>
